<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vegas Casino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Georgia', serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ========== LOADING SCREEN ========== */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 60px;
      background: #0a0008;
      transition: opacity 1s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* --- Night sky --- */
    .night-sky {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #1a0030 0%, #0a0018 40%, #000008 100%);
      overflow: hidden;
    }

    /* Stars */
    .stars {
      position: absolute;
      inset: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 2s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.4); }
    }

    /* --- Vegas Skyline SVG --- */
    .skyline {
      position: absolute;
      bottom: 140px;
      left: 0;
      width: 100%;
    }

    /* --- Neon glow on buildings --- */
    @keyframes neon-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px #ff0080) drop-shadow(0 0 12px #ff0080); }
      50%       { filter: drop-shadow(0 0 14px #ff00ff) drop-shadow(0 0 28px #ff00ff); }
    }
    @keyframes neon-pulse-gold {
      0%, 100% { filter: drop-shadow(0 0 6px #ffd700) drop-shadow(0 0 14px #ff8800); }
      50%       { filter: drop-shadow(0 0 16px #ffff00) drop-shadow(0 0 32px #ffd700); }
    }
    @keyframes neon-pulse-cyan {
      0%, 100% { filter: drop-shadow(0 0 8px #00ffff) drop-shadow(0 0 16px #0088ff); }
      50%       { filter: drop-shadow(0 0 18px #00ffff) drop-shadow(0 0 36px #00ccff); }
    }

    .neon-pink  { animation: neon-pulse      1.8s ease-in-out infinite; }
    .neon-gold  { animation: neon-pulse-gold 2.2s ease-in-out infinite; }
    .neon-cyan  { animation: neon-pulse-cyan 1.5s ease-in-out infinite; }

    /* --- Road / Ground --- */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 145px;
      background: linear-gradient(to bottom, #0d0d0d 0%, #1a1a1a 100%);
      border-top: 2px solid #333;
    }
    .road-line {
      position: absolute;
      bottom: 60px;
      left: 0;
      width: 100%;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #ffd700 0px, #ffd700 60px,
        transparent 60px, transparent 120px
      );
      animation: road-scroll 1s linear infinite;
    }
    @keyframes road-scroll {
      from { background-position: 0 0; }
      to   { background-position: 120px 0; }
    }

    /* --- Slot machine decoration --- */
    .slot-deco {
      position: absolute;
      top: 18px;
      display: flex;
      gap: 12px;
    }
    .slot-reel {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 3px solid #ffd700;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 12px #ffd70066, inset 0 0 8px #00000088;
      animation: reel-spin 0.18s steps(1) infinite;
      overflow: hidden;
      position: relative;
    }
    .slot-reel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #ffffff18 0%, transparent 50%, #00000044 100%);
      pointer-events: none;
    }

    @keyframes reel-spin {
      0%   { --sym: "🍒"; }
      14%  { --sym: "7️⃣"; }
      28%  { --sym: "🔔"; }
      42%  { --sym: "💎"; }
      57%  { --sym: "⭐"; }
      71%  { --sym: "🍋"; }
      85%  { --sym: "🎰"; }
    }

    /* --- Title --- */
    .casino-title {
      position: absolute;
      top: 90px;
      text-align: center;
      width: 100%;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .casino-title .main {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 900;
      background: linear-gradient(180deg, #fff8b0 0%, #ffd700 40%, #ff8800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px #ffd70099);
      animation: title-glow 2s ease-in-out infinite alternate;
    }
    .casino-title .sub {
      font-size: clamp(14px, 2.5vw, 22px);
      color: #cc00cc;
      letter-spacing: 10px;
      text-shadow: 0 0 12px #ff00ff, 0 0 24px #cc00cc;
      margin-top: 4px;
    }
    @keyframes title-glow {
      from { filter: drop-shadow(0 0 10px #ffd70066); }
      to   { filter: drop-shadow(0 0 30px #ffd700cc); }
    }

    /* --- Bottom HUD: loading --- */
    .loading-hud {
      position: relative;
      z-index: 10;
      width: min(480px, 90vw);
      text-align: center;
    }
    .loading-label {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaffaa;
      margin-bottom: 10px;
      text-shadow: 0 0 8px #00ff88;
    }
    .loading-bar-wrap {
      width: 100%;
      height: 18px;
      background: #0a1a0a;
      border: 2px solid #00aa44;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 12px #00ff4433, inset 0 0 6px #000;
      position: relative;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00cc44, #66ff88, #00ff44);
      border-radius: 8px;
      transition: width 0.12s ease;
      box-shadow: 0 0 10px #00ff44, 0 0 20px #00cc44;
      position: relative;
    }
    .loading-bar-fill::after {
      content: '';
      position: absolute;
      top: 3px; left: 10px; right: 10px; height: 4px;
      background: rgba(255,255,255,0.35);
      border-radius: 4px;
    }
    .loading-pct {
      font-size: 11px;
      color: #44ff88;
      margin-top: 7px;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00ff44;
    }

    /* ========== MAIN MENU ========== */
    #main-menu {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a0030 0%, #0a0018 50%, #000008 100%);
      z-index: 500;
    }
    #main-menu.active { display: flex; }

    .menu-bg-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Decorative corner neons */
    .corner-deco {
      position: absolute;
      font-size: 36px;
      opacity: 0.55;
    }
    .corner-deco.tl { top: 18px; left: 24px; }
    .corner-deco.tr { top: 18px; right: 24px; }
    .corner-deco.bl { bottom: 18px; left: 24px; }
    .corner-deco.br { bottom: 18px; right: 24px; }

    .menu-title {
      text-align: center;
      margin-bottom: 48px;
    }
    .menu-title .big {
      font-size: clamp(36px, 7vw, 84px);
      font-weight: 900;
      background: linear-gradient(180deg, #fff8b0 0%, #ffd700 45%, #ff8800 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 8px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 24px #ffd700aa);
      animation: title-glow 2.5s ease-in-out infinite alternate;
    }
    .menu-title .small {
      font-size: clamp(12px, 2vw, 18px);
      color: #ff44cc;
      letter-spacing: 12px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #ff00ff;
      margin-top: 6px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(340px, 85vw);
    }
    .menu-btn {
      padding: 16px 32px;
      font-size: 16px;
      font-family: 'Georgia', serif;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .menu-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0.4s;
    }
    .menu-btn:hover::before { left: 140%; }
    .menu-btn:hover { transform: translateY(-2px); }
    .menu-btn:active { transform: translateY(0px); }

    .btn-play {
      background: linear-gradient(135deg, #cc0044, #ff0066, #cc0044);
      color: #fff;
      box-shadow: 0 0 18px #ff006688, 0 4px 16px #880033;
      border: 1px solid #ff4488;
    }
    .btn-play:hover { box-shadow: 0 0 28px #ff0066cc, 0 6px 20px #990044; }

    .btn-secondary {
      background: linear-gradient(135deg, #111, #222, #111);
      color: #ffd700;
      box-shadow: 0 0 10px #ffd70033, 0 4px 12px #000;
      border: 1px solid #ffd700;
    }
    .btn-secondary:hover { box-shadow: 0 0 20px #ffd70066, 0 6px 16px #000; }

    .menu-version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 10px;
      color: #444;
      letter-spacing: 2px;
    }

    /* Floating chips animation */
    .chip {
      position: absolute;
      font-size: 22px;
      animation: float-chip var(--dur, 8s) ease-in-out infinite;
      opacity: 0.25;
      pointer-events: none;
    }
    @keyframes float-chip {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
      50%  { transform: translateY(-30px) rotate(180deg); opacity: 0.35; }
      100% { transform: translateY(0px) rotate(360deg); opacity: 0.15; }
    }
  </style>
</head>

<script>
// ─── Stars generator ───────────────────────────────────────────
function makeStars(containerId, count) {
  const c = document.getElementById(containerId);
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.4 + 0.6;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*70}%;
      width:${size}px;
      height:${size}px;
      --dur:${(Math.random()*2+1).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    c.appendChild(s);
  }
}
makeStars('stars-container', 140);
makeStars('menu-stars', 160);

// ─── Casino sound (Web Audio API) ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  try { audioCtx = new AudioCtx(); } catch(e) { return; }
}

function playNote(freq, start, dur, vol = 0.12, type = 'sine') {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
  gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + start + 0.05);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + start + dur);
  osc.start(audioCtx.currentTime + start);
  osc.stop(audioCtx.currentTime + start + dur + 0.05);
}

function playChime(freq, t) {
  playNote(freq,   t,      0.4,  0.18, 'triangle');
  playNote(freq*2, t+0.02, 0.25, 0.08, 'sine');
}

function playCasinoJingle() {
  // Ascending sparkle arpeggio - casino feel
  const notes = [523, 659, 784, 1047, 880, 784, 1047, 1175, 1319, 1047, 1319, 1568];
  notes.forEach((f, i) => playChime(f, i * 0.22));

  // Low rumble shimmer
  for (let i = 0; i < 18; i++) {
    const t = i * 0.25;
    playNote(60 + Math.random()*20, t, 0.3, 0.04, 'sawtooth');
  }

  // Final fanfare chord
  [523, 659, 784, 1047].forEach(f =>
    playNote(f, 4.0, 1.2, 0.08, 'triangle')
  );
}

// ─── Slot reel animation ───────────────────────────────────────
const symbols = ['🍒','7️⃣','🔔','💎','⭐','🍋','🎰','🃏','💰','🍀'];
const reelIds  = ['reel-1','reel-2','reel-3'];
let reelIntervals = [];

function startReels() {
  reelIds.forEach((id, ri) => {
    let idx = ri;
    const iv = setInterval(() => {
      idx = (idx + 1) % symbols.length;
      document.getElementById(id).textContent = symbols[idx];
    }, 90 + ri * 30);
    reelIntervals.push(iv);
  });
}

function stopReels(win = false) {
  reelIntervals.forEach(iv => clearInterval(iv));
  if (win) {
    document.getElementById('reel-1').textContent = '7️⃣';
    document.getElementById('reel-2').textContent = '7️⃣';
    document.getElementById('reel-3').textContent = '7️⃣';
  }
}

// ─── Loading bar ───────────────────────────────────────────────
function runLoadingBar(totalMs, onComplete) {
  const bar = document.getElementById('loading-bar');
  const pct = document.getElementById('loading-pct');
  let progress = 0;
  const steps  = 120;
  const step   = totalMs / steps;

  // Ease-in-out curve for more natural feel
  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  let tick = 0;
  const iv = setInterval(() => {
    tick++;
    const raw = tick / steps;
    const eased = easeInOut(Math.min(raw, 1));
    progress = eased * 100;

    bar.style.width = progress.toFixed(1) + '%';
    pct.textContent = Math.floor(progress) + '%';

    if (tick >= steps) {
      clearInterval(iv);
      bar.style.width = '100%';
      pct.textContent = '100%';
      setTimeout(onComplete, 400);
    }
  }, step);
}

// ─── Main boot sequence ────────────────────────────────────────
function boot() {
  initAudio();
  startReels();
  playCasinoJingle();

  // Loading takes ~6.5s so total with fade is ~7.5s
  runLoadingBar(6500, () => {
    stopReels(true); // 777 jackpot landing

    setTimeout(() => {
      const ls = document.getElementById('loading-screen');
      ls.classList.add('fade-out');

      setTimeout(() => {
        ls.style.display = 'none';
        document.getElementById('main-menu').classList.add('active');
      }, 1000);
    }, 600);
  });
}

// Start on first user interaction (required for AudioContext)
let started = false;
function tryStart(e) {
  if (started) return;
  started = true;
  boot();
}

document.addEventListener('click',   tryStart);
document.addEventListener('keydown', tryStart);
document.addEventListener('touchstart', tryStart);

// Also auto-start after short delay (visuals will play, audio may be muted)
setTimeout(() => {
  if (!started) {
    started = true;
    boot();
  }
}, 500);
</script>
